# === Color variables ===
$primary = rgb({{colors.primary.default.hex_stripped}})
$surface = rgb({{colors.surface.default.hex_stripped}})
$secondary = rgb({{colors.secondary.default.hex_stripped}})
$error = rgb({{colors.error.default.hex_stripped}})
$tertiary = rgb({{colors.tertiary.default.hex_stripped}})
$surface_lowest = rgb({{colors.surface_container_lowest.default.hex_stripped}})

# === System variables ===
$mainMod = SUPER
$term = alacritty
$editor = zeditor
$fileManager = $term --class "tuiFileManager" -e yazi
$browser = brave
$CONTROL = CTRL

# === Environment ===
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = LIBVA_DRIVER_NAME,iHD
env = __GLX_VENDOR_LIBRARY_NAME,mesa
env = HYPRSHOT_DIR,$HOME/Pictures/Screenshots

# === XWayland ===
xwayland {
    force_zero_scaling = true
}

# === Ecosystem ===
ecosystem {
    no_update_news = true
    no_donation_nag = true
}

# === Input ===
input {
    kb_layout = fr,ru
    kb_variant = ,
    repeat_delay = 212
    repeat_rate = 35
    numlock_by_default = true
    follow_mouse = 1

    touchpad {
        natural_scroll = true
    }

    tablet {
        output = current
    }

    sensitivity = 0
    force_no_accel = false
}

# === General ===
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = $primary
    col.inactive_border = $surface
    resize_on_border = true
    layout = dwindle
}

# === Gestures ===
gesture = 3, horizontal, workspace
gesture = 3, down, special

# === Group ===
group {
    col.border_active = $secondary
    col.border_inactive = $surface
    col.border_locked_active = $error
    col.border_locked_inactive = $surface

    groupbar {
        col.active = $secondary
        col.inactive = $surface
        col.locked_active = $error
        col.locked_inactive = $surface
    }
}

# === Layer rules ===

# === Decoration ===
decoration {
    rounding = 20
    rounding_power = 2

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    dim_special = 0.3

    blur {
        enabled = true
        special = true
        size = 3
        passes = 2
        vibrancy = 0.1696
        new_optimizations = true
        ignore_opacity = true
        xray = false
    }
}

# === Animations ===
animations {
    enabled = true

    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_decel_smooth, 0.2, 0.4, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = resize_smooth, 0.25, 0.1, 0.1, 1.0

    animation = windowsIn, 1, 4, md3_decel_smooth, popin 60%
    animation = windowsOut, 1, 4, md3_decel, slide
    animation = border, 1, 10, default
    animation = fade, 1, 3, md3_decel_smooth
    animation = workspaces, 1, 7, fluent_decel, slidefade 15%
    animation = specialWorkspace, 1, 3, md3_decel_smooth, slidevert
}

# === Layouts ===
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
    new_on_top = true
    mfact = 0.5
}

# === Misc ===
misc {
    disable_hyprland_logo = true
    mouse_move_focuses_monitor = true
    swallow_regex = ^(Alacritty|kitty)$
    enable_swallow = true
    vfr = true
    vrr = 0
}

render {
    direct_scanout = 2
}

# === Keybinds continues (binde) ===
binde = $mainMod SHIFT, right, resizeactive, 10 0
binde = $mainMod SHIFT, left, resizeactive, -10 0
binde = $mainMod SHIFT, up, resizeactive, 0 -10
binde = $mainMod SHIFT, down, resizeactive, 0 10
binde = , XF86MonBrightnessDown, exec, noctalia-shell ipc call brightness decrease
binde = , XF86MonBrightnessUp, exec, noctalia-shell ipc call brightness increase
binde = , XF86AudioLowerVolume, exec, pamixer -d 2
binde = , XF86AudioRaiseVolume, exec, pamixer -i 2

# === Keybinds (bind) ===

# 1. WINDOW MANAGEMENT
bind = $mainMod, Q, exec, ~/nixcfg/modules/interface/desktop/hyprland/scripts/dontkillsteam.sh #"Close window"
bind = $mainMod, W, togglefloating #"Toggle floating"
bind = $mainMod, F, fullscreen #"Toggle fullscreen"
bind = $CONTROL, ESCAPE, exec, noctalia-shell ipc call bar toggle #"Toggle bar"

bind = $mainMod, tab, cyclenext #"Cycle next window"
bind = $mainMod, tab, bringactivetotop
bind = $mainMod, left, movefocus, l #"Focus left window"
bind = $mainMod, right, movefocus, r #"Focus right window"
bind = $mainMod, up, movefocus, u #"Focus up window"
bind = $mainMod, down, movefocus, d #"Focus down window"

bind = $mainMod CTRL, left, movewindow, l #"Move window to the left"
bind = $mainMod CTRL, right, movewindow, r #"Move window to the right"
bind = $mainMod CTRL, up, movewindow, u #"Move window up"
bind = $mainMod CTRL, down, movewindow, d #"Move window down"

# 2. WORKSPACES
bind = $mainMod, code:87, workspace, 1 #"Workspace 1"
bind = $mainMod SHIFT, code:87, movetoworkspace, 1 #"Move to Workspace 1"
bind = $mainMod CTRL, code:87, movetoworkspacesilent, 1 #"Move to Workspace 1 silently"
bind = $mainMod, code:88, workspace, 2 #"Workspace 2"
bind = $mainMod SHIFT, code:88, movetoworkspace, 2 #"Move to Workspace 2"
bind = $mainMod CTRL, code:88, movetoworkspacesilent, 2 #"Move to Workspace 2 silently"
bind = $mainMod, code:89, workspace, 3 #"Workspace 3"
bind = $mainMod SHIFT, code:89, movetoworkspace, 3 #"Move to Workspace 3"
bind = $mainMod CTRL, code:89, movetoworkspacesilent, 3 #"Move to Workspace 3 silently"
bind = $mainMod, code:83, workspace, 4 #"Workspace 4"
bind = $mainMod SHIFT, code:83, movetoworkspace, 4 #"Move to Workspace 4"
bind = $mainMod CTRL, code:83, movetoworkspacesilent, 4 #"Move to Workspace 4 silently"
bind = $mainMod, code:84, workspace, 5 #"Workspace 5"
bind = $mainMod SHIFT, code:84, movetoworkspace, 5 #"Move to Workspace 5"
bind = $mainMod CTRL, code:84, movetoworkspacesilent, 5 #"Move to Workspace 5 silently"
bind = $mainMod, code:85, workspace, 6 #"Workspace 6"
bind = $mainMod SHIFT, code:85, movetoworkspace, 6 #"Move to Workspace 6"
bind = $mainMod CTRL, code:85, movetoworkspacesilent, 6 #"Move to Workspace 6 silently"
bind = $mainMod, code:79, workspace, 7 #"Workspace 7"
bind = $mainMod SHIFT, code:79, movetoworkspace, 7 #"Move to Workspace 7"
bind = $mainMod CTRL, code:79, movetoworkspacesilent, 7 #"Move to Workspace 7 silently"
bind = $mainMod, code:80, workspace, 8 #"Workspace 8"
bind = $mainMod SHIFT, code:80, movetoworkspace, 8 #"Move to Workspace 8"
bind = $mainMod CTRL, code:80, movetoworkspacesilent, 8 #"Move to Workspace 8 silently"
bind = $mainMod CTRL, code:80, movetoworkspacesilent, 8 #"Move to Workspace 8 silently"
bind = $mainMod, code:81, workspace, 9 #"Workspace 9"
bind = $mainMod SHIFT, code:81, movetoworkspace, 9 #"Move to Workspace 9"
bind = $mainMod CTRL, code:81, movetoworkspacesilent, 9 #"Move to Workspace 9 silently"
bind = $mainMod, code:90, workspace, 10 #"Workspace 10"
bind = $mainMod SHIFT, code:90, movetoworkspace, 10 #"Move to Workspace 10"
bind = $mainMod CTRL, code:90, movetoworkspacesilent, 10 #"Move to Workspace 10 silently"

bind = $mainMod ALT, down, workspace, empty #"First empty workspace"


bind = $mainMod, S, togglespecialworkspace, #"Special Workspace"
bind = $mainMod CTRL, S, movetoworkspacesilent, special #"Move to Special Workspace silently"
bind = $mainMod, G, togglespecialworkspace, steam

bind = $mainMod, mouse_down, workspace, e+1 #"Next workspace"
bind = $mainMod, mouse_up, workspace, e-1 #"Previous workspace"

bind = $mainMod, mouse:276, workspace, 1 #"Workspace 1"
bind = $mainMod, mouse:275, workspace, 6 #"Workspace 6"
bind = $mainMod SHIFT, mouse:276, movetoworkspace, 1
bind = $mainMod SHIFT, mouse:275, movetoworkspace, 6
bind = $mainMod CTRL, mouse:276, movetoworkspacesilent, 1
bind = $mainMod CTRL, mouse:275, movetoworkspacesilent, 6

# 3. APPLICATIONS
bind = $mainMod, U, exec, $term -e rebuild #"NixOS rebuild"

bind = $mainMod, L, exec, noctalia-shell ipc call lockScreen lock #"Lock Screen"
bind = $mainMod, backspace, exec, noctalia-shell ipc call sessionMenu toggle #"Session Menu"

bind = $mainMod, T, exec, $term #"Terminal"
bind = $mainMod, D, exec, $fileManager #"File Manager"
bind = $mainMod, C, exec, $editor #"Editor"
bind = $mainMod, B, exec, $browser #"Browser"
bind = $mainMod, M, exec, spotify #"Spotify"
bind = $mainMod CTRL, C, exec, hyprpicker --autocopy --format=hex #"Color Picker"

bind = $mainMod, A, exec, noctalia-shell ipc call launcher toggle #"Launcher"
bind = $mainMod, SPACE, exec, noctalia-shell ipc call controlCenter toggle #"Control Center"
bind = $mainMod SHIFT, W, exec, noctalia-shell ipc call wallpaper toggle #"Wallpaper"
bind = $mainMod SHIFT, C, exec, noctalia-shell ipc call launcher calculator
bind = $mainMod, E, exec, noctalia-shell ipc call launcher emoji #"Emoji"
bind = $mainMod ALT, K, exec, hyprctl switchxkblayout all next
bind = $mainMod, less, exec, noctalia-shell ipc call notifications toggleHistory #"Notifications History"
bind = $mainMod, K, exec, noctalia-shell ipc call plugin:keybind-cheatsheet toggle

# 4. MEDIA
bind = , xf86Sleep, exec, systemctl suspend
bind = , XF86AudioMicMute, exec, pamixer --default-source -t #"Mic Mute"
bind = , XF86AudioMute, exec, pamixer -t #"Mute"
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , xf86AudioNext, exec, playerctl next
bind = , xf86AudioPrev, exec, playerctl previous

bind = $mainMod, F8, exec, kill $(cat /tmp/auto-clicker.pid) 2>/dev/null || ~/nixcfg/modules/interface/desktop/hyprland/scripts/autoclicker --cps 40

# === Mouse binds ===
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

binds {
    workspace_back_and_forth = 0
}

# === Window rules ===

windowrule {
  name = opacity-terminals
  match:class = ^(kitty|alacritty|Alacritty|org.wezfurlong.wezterm)$
  opacity = 0.80 0.70
}
windowrule {
  name = opacity-nvim
  match:class = nvim-wrapper
  opacity = 0.80 0.80
}
windowrule {
  name = opacity-emacs
  match:class = Emacs
  opacity = 0.90 0.90
}
windowrule {
  name = opacity-gcr
  match:class = gcr-prompter
  opacity = 0.90 0.90
}
windowrule {
  name = opacity-polkit-title
  match:title = ^(Hyprland Polkit Agent)$
  opacity = 0.90 0.90
}
windowrule {
  name = opacity-brave
  match:class = ^(brave-browser|Brave-browser)$
  opacity = 0.95 0.85
}
windowrule {
  name = opacity-filemanagers
  match:class = ^(org.gnome.Nautilus|thunar)$
  opacity = 0.80 0.80
}
windowrule {
  name = opacity-steam
  match:class = ^(Steam|steam|steamwebhelper)$
  opacity = 0.80 0.80
}
windowrule {
  name = opacity-zed
  match:class = ^(Zed|dev.zed.Zed|coda-qt)$
  opacity = 0.90 0.90
}
windowrule {
  name = opacity-utilities
  match:class = ^(tuiFileManager|org.kde.dolphin|org.kde.ark|nwg-look|qt5ct|qt6ct)$
  opacity = 0.80 0.80
}
windowrule {
  name = opacity-misc
  match:class = ^(com.github.tchx84.Flatseal|hu.kramo.Cartridges|com.obsproject.Studio|gnome-boxes)$
  opacity = 0.80 0.80
}
windowrule {
  name = opacity-discord
  match:class = ^(discord|WebCord)$
  opacity = 0.90 0.90
}
windowrule {
  name = opacity-spotify
  match:class = spotify
  opacity = 0.90 0.70
}
windowrule {
  name = opacity-apps
  match:class = ^(app.drey.Warp|net.davidotek.pupgui2|Signal|io.gitlab.theevilskeleton.Upscaler)$
  opacity = 0.80 0.80
}
windowrule {
  name = opacity-audio-net
  match:class = ^(pavucontrol|org.pulseaudio.pavucontrol|blueman-manager|.blueman-manager-wrapped|nm-applet|nm-connection-editor)$
  opacity = 0.80 0.70
}
windowrule {
  name = opacity-polkit
  match:class = hyprpolkitagent
  opacity = 0.80 0.70
}

windowrule {
  name = tag-games-content
  match:content = 3
  tag = +games
}
windowrule {
  name = tag-games-class
  match:class = ^(steam_app.*|steam_app_\d+|gamescope|Waydroid|osu!)$
  tag = +games
}
windowrule {
  name = games-effects
  match:tag = games
  monitor = HDMI-A-1
  sync_fullscreen = true
  fullscreen = true
  border_size = 0
  no_shadow = true
  no_blur = true
  no_anim = true
}

windowrule {
  name = video-effects
  match:tag = video
  sync_fullscreen = true
  fullscreen = true
  border_size = 0
  no_shadow = true
  no_anim = true
}

windowrule {
  name = float-misc
  match:class = ^(qt5ct|nwg-look|org.kde.ark|Signal|com.github.rafostar.Clapper|app.drey.Warp|net.davidotek.pupgui2|eog|io.gitlab.theevilskeleton.Upscaler|pavucontrol|blueman-manager|.blueman-manager-wrapped|nm-applet|nm-connection-editor)$
  float = true
}
windowrule {
  name = float-polkit
  match:class = hyprpolkitagent
  float = true
}
windowrule {
  name = float-spotify
  match:class = spotify
  float = true
  size = 830 875
  move = 10 55
}
windowrule {
  name = float-cava
  match:title = Cava
  float = true
  size = 1000 500
  move = 880 675
}

# === Monitors ===
monitor = ,preferred,auto,1
monitor = eDP-1,2560x1600@60,auto,1.3333334
monitor = desc:AOC CU34G4Z 1H0R5HA001666,3440x1440@240,auto,1.3333334

# === Workspaces ===
workspace = 1,monitor:eDP-1,default:true
workspace = 2,monitor:eDP-1
workspace = 3,monitor:eDP-1
workspace = 4,monitor:eDP-1
workspace = 5,monitor:eDP-1
workspace = 6,monitor:desc:AOC CU34G4Z 1H0R5HA001666,default:true
workspace = 7,monitor:desc:AOC CU34G4Z 1H0R5HA001666
workspace = 8,monitor:desc:AOC CU34G4Z 1H0R5HA001666
workspace = 9,monitor:desc:AOC CU34G4Z 1H0R5HA001666
workspace = 10,monitor:desc:AOC CU34G4Z 1H0R5HA001666

# === Exec-once ===
exec-once = noctalia-shell
exec-once = [workspace 3 silent] spotify
exec-once = [workspace 3 silent] alacritty -t Cava -e cava
exec-once = [workspace 6 silent] $browser
exec-once = sleep 1; hyprctl dispatch workspace 1
